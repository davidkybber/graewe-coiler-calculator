<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GRAEWE Coiler Calculator - Professional coil calculator for manufacturing and industrial applications" />
    <meta name="theme-color" content="#ffd600" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>GRAEWE Coiler Calculator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      // GitHub Pages client-side routing support
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
